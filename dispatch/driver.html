<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#0b0b0e">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>AvaLimo Driver</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#07070b; --panel:#0e0e14; --panel-2:#16161e;
  --text:#f0ece4; --muted:#7a7a8a; --subtle:#555566;
  --gold:#d4af37; --gold-2:#c4a030; --gold-light:#e8d48b;
  --gold-soft:rgba(212,175,55,.1);
  --green:#10b981; --red:#ef4444; --blue:#60a5fa; --amber:#f59e0b;
  --border:rgba(255,255,255,.06); --border-gold:rgba(212,175,55,.2);
  --radius:16px; --radius-sm:10px;
  --shadow:0 8px 30px rgba(0,0,0,.5);
  --glass:rgba(14,14,20,.9);
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Inter, system-ui, sans-serif;
  font-size:16px;
}
html,body{background:var(--bg);color:var(--text);min-height:100vh;-webkit-font-smoothing:antialiased;line-height:1.5;overflow-x:hidden}
::selection{background:rgba(212,175,55,.3);color:#fff}
button{font:inherit;cursor:pointer;border:none;background:none;color:inherit}
input{font:inherit;background:var(--panel-2);color:var(--text);border:1px solid var(--border);border-radius:var(--radius-sm);padding:14px 16px;outline:none;transition:all .2s;width:100%}
input:focus{border-color:var(--gold);box-shadow:0 0 0 3px rgba(212,175,55,.1);background:rgba(212,175,55,.04)}
::placeholder{color:var(--subtle);opacity:.6}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}

/* Animated orbs */
.orbs{position:fixed;inset:0;overflow:hidden;pointer-events:none;z-index:0}
.orbs span{position:absolute;width:400px;height:400px;border-radius:50%;background:radial-gradient(circle,rgba(212,175,55,.05) 0%,transparent 70%);animation:orbDrift 15s ease-in-out infinite}
.orbs span:nth-child(1){top:-15%;left:-10%;animation-delay:0s}
.orbs span:nth-child(2){bottom:-25%;right:-15%;width:500px;height:500px;animation-delay:-5s;animation-direction:reverse}
.orbs span:nth-child(3){top:30%;left:60%;width:300px;height:300px;animation-delay:-10s}
@keyframes orbDrift{0%,100%{transform:translate(0,0) scale(1)}25%{transform:translate(80px,-50px) scale(1.15)}50%{transform:translate(-40px,80px) scale(.9)}75%{transform:translate(50px,40px) scale(1.08)}}

/* Login */
.login{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:24px;
  background:radial-gradient(ellipse at 50% 20%,rgba(212,175,55,.07),transparent 60%),radial-gradient(ellipse at 80% 80%,rgba(212,175,55,.03),transparent 50%),var(--bg)}
.login-card{background:var(--panel);border:1px solid var(--border-gold);border-radius:var(--radius);padding:40px 32px;max-width:370px;width:100%;text-align:center;box-shadow:0 24px 80px rgba(0,0,0,.5)}
.logo{width:60px;height:60px;border-radius:16px;background:linear-gradient(135deg,var(--gold),var(--gold-2));display:flex;align-items:center;justify-content:center;font-weight:800;font-size:20px;color:#0a0a0d;margin:0 auto 14px;box-shadow:0 5px 20px rgba(212,175,55,.3)}
.brand h1{font-size:26px;margin:0 0 4px;font-weight:700;letter-spacing:-.3px}
.brand h1 em{color:var(--gold);font-style:normal}
.brand p{color:var(--muted);font-size:14px;margin:0 0 26px}
.login-form{display:flex;flex-direction:column;gap:10px}
.login-form .btn{width:100%;padding:14px;font-size:15px;margin-top:4px}
.err{color:var(--red);font-size:13px;min-height:20px;text-align:center}

/* App Shell */
.shell{display:none;min-height:100vh;padding-bottom:100px;position:relative;z-index:1}

/* Top Header */
.top{position:sticky;top:0;z-index:20;background:var(--glass);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-bottom:1px solid var(--border);padding:12px 18px;display:flex;align-items:center;justify-content:space-between}
.who{display:flex;align-items:center;gap:10px}
.av{width:38px;height:38px;border-radius:50%;background:linear-gradient(135deg,var(--gold),var(--gold-2));color:#0a0a0d;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:15px;box-shadow:0 2px 10px rgba(212,175,55,.2)}
.who .nm{font-weight:600;font-size:15px}
.who .st{font-size:11px;color:var(--muted)}
.header-right{display:flex;align-items:center;gap:10px}
.status-dot{width:10px;height:10px;border-radius:50%;display:inline-block;transition:all .3s}
.status-dot.on{background:var(--green);box-shadow:0 0 14px rgba(16,185,129,.5)}
.status-dot.off{background:var(--muted)}

/* Bottom Nav */
.bnav{position:fixed;bottom:0;left:0;right:0;z-index:20;background:rgba(14,14,20,.95);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-top:1px solid var(--border);display:flex;justify-content:space-around;padding:6px 0;padding-bottom:max(6px,env(safe-area-inset-bottom));box-shadow:0 -4px 30px rgba(0,0,0,.5)}
.bnav button{display:flex;flex-direction:column;align-items:center;gap:2px;padding:8px 16px;color:var(--muted);font-size:10px;font-weight:500;transition:color .2s;background:none;border:none;cursor:pointer}
.bnav button i{font-size:18px;transition:color .2s}
.bnav button.on{color:var(--gold)}
.bnav button.on i{color:var(--gold)}

/* Pages */
.page{display:none;padding:18px;animation:fadeUp .25s ease}
.page.on{display:block}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

.section-title{font-size:11px;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);margin:0 0 10px;font-weight:600;display:flex;align-items:center;gap:6px}
.section-title i{opacity:.5}

/* Trip Cards */
.trip-card{background:var(--panel);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:10px;cursor:pointer;transition:all .25s;position:relative;overflow:hidden}
.trip-card::before{content:'';position:absolute;top:0;left:0;width:3px;height:100%;background:linear-gradient(180deg,var(--gold),var(--gold-2));opacity:0;transition:opacity .25s}
.trip-card:hover{transform:translateX(4px);border-color:rgba(212,175,55,.18)}
.trip-card:hover::before{opacity:1}
.trip-card:active{transform:scale(.99)}
.trip-card.compact{cursor:default;padding:12px}
.trip-card.compact::before{display:none}
.trip-card.compact:hover{transform:none;border-color:var(--border)}
.trip-card .tc-head{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px}
.trip-card .tc-fare{font-weight:700;color:var(--gold);font-size:16px}
.trip-card .tc-route{padding:4px 0 6px}
.trip-card .tc-route>div{font-size:14px;line-height:1.5}
.trip-card .tc-route .arrow{color:var(--muted);font-size:11px;padding:3px 0;display:flex;align-items:center;gap:6px}
.trip-card .tc-route .arrow i{font-size:10px;opacity:.4}
.trip-card .tc-meta{display:flex;flex-wrap:wrap;gap:8px;margin-top:8px}
.trip-card .tc-meta span{background:rgba(255,255,255,.04);padding:4px 10px;border-radius:6px;font-size:12px;color:var(--muted);display:flex;align-items:center;gap:4px}
.trip-card .tc-meta span i{opacity:.5;font-size:11px}

/* Earnings */
.earn-hero{text-align:center;padding:32px 0 20px;background:linear-gradient(180deg,rgba(212,175,55,.07),transparent 80%);border-radius:var(--radius);margin-bottom:16px}
.earn-hero .total{font-size:44px;font-weight:800;color:var(--gold);letter-spacing:-1px;line-height:1.1}
.earn-hero .label{color:var(--muted);margin-top:2px;font-size:13px;text-transform:uppercase;letter-spacing:.05em}
.earn-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:18px}
.earn-grid>div{background:var(--panel);border:1px solid var(--border);border-radius:var(--radius);padding:16px;text-align:center;transition:border-color .25s}
.earn-grid>div:hover{border-color:rgba(212,175,55,.12)}
.earn-grid b{display:block;font-size:20px;color:var(--gold);font-weight:700}
.earn-grid span{font-size:12px;color:var(--muted);margin-top:2px;display:block}

/* Settings */
.set-group{margin-bottom:14px}
.set-group .set-label{font-size:11px;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);padding:0 4px 8px;font-weight:600}
.set-group .set-card{background:var(--panel);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden}
.set-row{display:flex;align-items:center;padding:14px 16px;border-top:1px solid var(--border);cursor:pointer;transition:background .15s}
.set-row:first-child{border-top:none}
.set-row:hover{background:var(--panel-2)}
.set-row .sl{display:flex;align-items:center;gap:12px;flex:1;min-width:0}
.set-row .sic{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:16px}
.set-row .lb{font-weight:500;font-size:14px}
.set-row .sb{color:var(--muted);font-size:12px;margin-top:1px}

/* Modal */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.7);display:flex;align-items:flex-end;justify-content:center;z-index:100;backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);animation:fadeIn .15s ease}
.modal-bg .modal-cont{background:var(--panel);border:1px solid var(--border-gold);border-top-left-radius:var(--radius);border-top-right-radius:var(--radius);padding:24px;max-height:80vh;width:100%;overflow:auto;animation:slideUp .25s ease}
@media(min-width:600px){.modal-bg{align-items:center}.modal-bg .modal-cont{border-radius:var(--radius);max-width:440px;width:90vw}}
@keyframes slideUp{from{transform:translateY(20px);opacity:0}to{transform:translateY(0);opacity:1}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.modal-handle{width:40px;height:4px;border-radius:4px;background:var(--border);margin:0 auto 14px}
.modal-cont h3{font-size:17px;font-weight:700;margin:0 0 14px}
.modal-cont h3 span{color:var(--gold)}
.modal-cont .kv{display:flex;justify-content:space-between;padding:9px 0;border-top:1px solid var(--border);font-size:14px}
.modal-cont .kv:first-of-type{border-top:none}
.modal-cont .kv .k{color:var(--muted);font-size:13px}
.modal-cont .kv .v{text-align:right;max-width:65%;font-weight:500;font-size:14px}
.modal-actions{display:flex;gap:8px;margin-top:16px;flex-wrap:wrap}
.modal-actions .btn{flex:1}

/* Buttons */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:12px 22px;border-radius:var(--radius-sm);background:linear-gradient(135deg,var(--gold),var(--gold-2));color:#0a0a0d;font-weight:600;font-size:14px;transition:all .2s;border:none;white-space:nowrap;cursor:pointer}
.btn:hover{opacity:.93;transform:translateY(-2px);box-shadow:0 6px 24px rgba(212,175,55,.3)}
.btn:active{transform:scale(.97)}
.btn-sm{padding:8px 14px;font-size:12px;border-radius:8px}
.btn-ghost{background:transparent;color:var(--text);border:1px solid var(--border)}
.btn-ghost:hover{background:rgba(255,255,255,.04);border-color:var(--gold);box-shadow:none}
.btn-success{background:linear-gradient(135deg,var(--green),#059669);color:#fff}
.btn-success:hover{box-shadow:0 4px 16px rgba(16,185,129,.3)}
.btn-danger{background:linear-gradient(135deg,var(--red),#dc2626);color:#fff}

/* Badge */
.badge-dr{display:inline-flex;align-items:center;padding:3px 10px;border-radius:99px;font-size:11px;font-weight:600;letter-spacing:.03em;text-transform:uppercase}
.badge-dr.new{background:rgba(212,175,55,.12);color:var(--gold)}
.badge-dr.progress{background:rgba(96,144,240,.12);color:var(--blue)}
.badge-dr.done{background:rgba(16,185,129,.12);color:var(--green)}
.badge-dr.cancelled{background:rgba(239,68,68,.12);color:var(--red)}

/* Toast */
.toast{position:fixed;top:16px;right:16px;z-index:9999;display:flex;align-items:center;gap:8px;padding:12px 18px;border-radius:var(--radius-sm);background:var(--panel-2);border:1px solid var(--border);box-shadow:0 12px 48px rgba(0,0,0,.6);animation:slideIn .2s ease;font-size:14px;border-left:3px solid var(--green)}
.toast.err{border-left-color:var(--red)}
@keyframes slideIn{from{transform:translateY(-16px);opacity:0}to{transform:translateY(0);opacity:1}}

/* Empty */
.empty{text-align:center;padding:40px 20px;color:var(--muted)}
.empty i{font-size:36px;display:block;margin-bottom:8px;opacity:.25}
.empty b{color:var(--text);display:block;margin-bottom:4px}

@media(max-width:480px){
  .login-card{padding:28px 20px}
  .logo{width:50px;height:50px;font-size:17px}
  .brand h1{font-size:22px}
  .page{padding:14px}
  .earn-hero .total{font-size:32px}
  .earn-grid{grid-template-columns:1fr;gap:8px}
  .trip-card{padding:14px}
}
</style>
</head>
<body>
<div class="orbs"><span></span><span></span><span></span></div>

<!-- LOGIN -->
<div id="login" class="login">
  <div class="login-card">
    <div class="logo">A</div>
    <div class="brand">
      <h1>AvaLimo <em>Driver</em></h1>
      <p>Sign in with your email and password</p>
    </div>
    <form id="loginForm" class="login-form">
      <input type="email" id="liEmail" placeholder="Email" autocomplete="email" required>
      <input type="password" id="liPw" placeholder="Password" autocomplete="current-password" required>
      <div id="loginErr" class="err"></div>
      <button type="submit" class="btn" id="loginBtn"><i class="fas fa-arrow-right-to-bracket"></i> Sign in</button>
    </form>
  </div>
</div>

<!-- APP SHELL -->
<div id="shell" class="shell">

  <!-- Top Header -->
  <header class="top">
    <div class="who">
      <div class="av" id="av">D</div>
      <div>
        <div class="nm" id="nm">Driver</div>
        <div class="st"><span id="ol">Online</span></div>
      </div>
    </div>
    <div class="header-right">
      <span class="status-dot on" id="dot"></span>
      <button id="tg" class="btn btn-sm btn-ghost"><i class="fas fa-power-off"></i></button>
    </div>
  </header>

  <!-- Pages -->
  <section id="pTrips" class="page on">
    <div class="section-title"><i class="fas fa-car-side"></i> Active Trips</div>
    <div id="tl"></div>
    <div class="section-title" style="margin-top:20px"><i class="fas fa-check-circle"></i> Completed Today</div>
    <div id="cl"></div>
  </section>

  <section id="pEarnings" class="page">
    <div id="ec"></div>
  </section>

  <section id="pSettings" class="page">
    <div id="sc"></div>
  </section>

  <!-- Bottom Nav -->
  <nav class="bnav">
    <button class="on" data-tab="Trips"><i class="fas fa-car"></i> Trips</button>
    <button data-tab="Earnings"><i class="fas fa-dollar-sign"></i> Earnings</button>
    <button data-tab="Settings"><i class="fas fa-gear"></i> Settings</button>
  </nav>
</div>

<!-- TRIP MODAL -->
<div id="modal" class="modal-bg" style="display:none">
  <div class="modal-cont">
    <div class="modal-handle"></div>
    <div style="display:flex;justify-content:space-between;align-items:flex-start">
      <h3 id="mt">Trip</h3>
      <button onclick="mc()" class="btn btn-sm btn-ghost" style="padding:6px 10px"><i class="fas fa-times"></i></button>
    </div>
    <div id="mb"></div>
    <div id="ma" class="modal-actions"></div>
  </div>
</div>

<script>
(function(){
'use strict';
var D=null, TS=[], CS=[], S=null, ON=true, TOKEN=null;

function $(s){return document.getElementById(s);}
function esc(s){
  if(s==null) return '';
  return String(s).replace(/[&<>"']/g, function(c){
    return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c];
  });
}
function toast(msg, kind){
  var t=document.createElement('div');
  t.className='toast '+(kind||'ok');
  t.innerHTML = '<i class="fas '+(kind==='err'?'fa-exclamation-circle':'fa-check-circle')+'"></i> '+esc(msg);
  document.body.appendChild(t);
  setTimeout(function(){t.remove();},2500);
}
function api(method, path, body){
  var opts = {
    method: method,
    headers: {
      'Content-Type': 'application/json',
      'apikey': 'eyJ0eXAiOiJKV1QiLCJhbGciOiJIUzI1NiJ9.eyJpc3MiOiJzdXBhYmFzZSIsImlhdCI6MTc3OTk3MzU2MCwiZXhwIjo0OTM1NjQ3MTYwLCJyb2xlIjoiYW5vbiJ9.dChI5FNC5H_O5rYqH1g6byYqfCYlUclcNVUHaiNXnHY',
    }
  };
  if(TOKEN) opts.headers['Authorization'] = 'Bearer ' + TOKEN;
  if(body !== undefined) opts.body = JSON.stringify(body);
  return fetch(path, opts).then(function(r){
    if(!r.ok) return r.json().then(function(e){
      var msg = (e && (e.msg || e.error_description || e.message)) || ('HTTP '+r.status);
      throw new Error(msg);
    });
    if(r.status === 204) return null;
    return r.json();
  });
}

// ── Login ──
$('loginForm').addEventListener('submit', function(e){
  e.preventDefault();
  var btn = $('loginBtn');
  btn.disabled = true; btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Signing in…';
  var email = $('liEmail').value.trim();
  var pw = $('liPw').value;
  fetch('/api/driver/login', {
    method: 'POST',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify({email: email, password: pw})
  }).then(function(r){
    if(!r.ok) return r.json().then(function(e){throw new Error(e.error||('HTTP '+r.status));});
    return r.json();
  }).then(function(j){
    TOKEN = j.access_token;
    D = j.driver;
    $('login').style.display='none';
    $('shell').style.display='block';
    $('nm').textContent = D.name || 'Driver';
    $('av').textContent = (D.name||'D')[0].toUpperCase();
    ld();
    if(window._poll) clearInterval(window._poll);
    window._poll = setInterval(ld, 15000);
  }).catch(function(e){
    $('loginErr').textContent = e.message;
  }).finally(function(){
    btn.disabled = false; btn.innerHTML = '<i class="fas fa-arrow-right-to-bracket"></i> Sign in';
  });
});

// ── Tab switching ──
function sw(t){
  document.querySelectorAll('.page').forEach(function(p){p.classList.remove('on');});
  document.querySelectorAll('.bnav button').forEach(function(b){b.classList.remove('on');});
  $('p'+t).classList.add('on');
  document.querySelector('.bnav button[data-tab="'+t+'"]').classList.add('on');
  if(t==='Earnings') renderEarnings();
  if(t==='Settings') renderSettings();
}
document.querySelectorAll('.bnav button').forEach(function(b){
  b.addEventListener('click', function(){sw(b.getAttribute('data-tab'));});
});

// ── Toggle online/offline ──
$('tg').addEventListener('click', function(){
  ON=!ON;
  api('PATCH','/api/drivers/'+D.id+'?token='+encodeURIComponent(TOKEN),{status: ON?'online':'offline'})
    .catch(function(){});
  $('ol').textContent = ON?'Online':'Offline';
  $('dot').className = 'status-dot '+(ON?'on':'off');
});

// ── Load data ──
function ld(){
  if(!D) return;
  api('GET','/api/driver/reservations?driver_id='+D.id+'&token='+encodeURIComponent(TOKEN))
    .then(function(rows){
      TS = rows.filter(function(t){return t.status!=='completed' && t.status!=='cancelled';});
      CS = rows.filter(function(t){return t.status==='completed';});
      renderTrips();
      renderCompleted();
    }).catch(function(e){toast(e.message,'err');});
}

function statusBadgeDr(s){
  var label = s==='assigned'||s==='pending'?'NEW':s==='in_progress'?'IN PROGRESS':s==='completed'?'DONE':s==='cancelled'?'CANCELLED':(s||'').replace('_',' ').toUpperCase();
  var cls = s==='in_progress'?'progress':s==='completed'?'done':s==='cancelled'?'cancelled':'new';
  return '<span class="badge-dr '+cls+'">'+esc(label)+'</span>';
}
function fare(n){ n = Number(n||0); return '$'+n.toFixed(2); }
function fmtTime(t){
  if(!t) return '';
  var d = new Date(t);
  if(isNaN(d.getTime())) return String(t).replace('T',' ').slice(0,16);
  var h=d.getHours(), m=d.getMinutes();
  return (h<10?'0':'')+h+':'+(m<10?'0':'')+m;
}

// ── Render trips ──
function renderTrips(){
  var h='';
  if(TS.length===0){
    h='<div class="empty"><i class="fas fa-car-side"></i><b>No active trips</b><div style="font-size:13px;color:var(--muted)">Waiting for dispatch…</div></div>';
  } else {
    TS.forEach(function(t,i){
      h += '<div class="trip-card" data-id="'+t.id+'">'
        + '<div class="tc-head">'
        + statusBadgeDr(t.status)
        + '<span class="tc-fare">'+fare(t.price)+'</span>'
        + '</div>'
        + '<div class="tc-route">'
        + '<div><i class="fas fa-circle" style="font-size:8px;color:var(--gold);margin-right:6px"></i>'+esc(t.pickup_location)+'</div>'
        + '<div class="arrow"><i class="fas fa-arrow-down"></i></div>'
        + '<div><i class="fas fa-location-dot" style="font-size:8px;color:var(--red);margin-right:6px"></i>'+esc(t.dropoff_location||'TBD')+'</div>'
        + '</div>'
        + '<div class="tc-meta">'
        + '<span><i class="fas fa-user"></i> '+esc(t.passenger_name||'-')+'</span>'
        + (t.passenger_phone?'<span><i class="fas fa-phone"></i> '+esc(t.passenger_phone)+'</span>':'')
        + (t.pickup_time?'<span><i class="fas fa-clock"></i> '+esc(fmtTime(t.pickup_time))+'</span>':'')
        + '</div>'
        + '</div>';
    });
  }
  $('tl').innerHTML = h;
  document.querySelectorAll('#tl .trip-card').forEach(function(c){
    c.addEventListener('click', function(){op(c.getAttribute('data-id'));});
  });
}

function renderCompleted(){
  var h='';
  var today = new Date().toISOString().slice(0,10);
  var todays = CS.filter(function(c){return c.created_at && c.created_at.slice(0,10)===today;});
  if(todays.length===0){
    h='<div class="empty"><i class="fas fa-check-circle"></i><b>No completed trips today</b></div>';
  } else {
    todays.forEach(function(c){
      h += '<div class="trip-card compact">'
        + '<div style="display:flex;justify-content:space-between;align-items:center">'
        + '<span class="muted" style="font-size:12px">'+esc((c.created_at||'').slice(16).replace('T',' '))+'</span>'
        + '<span style="font-weight:700;color:var(--gold)">'+fare(c.price)+'</span>'
        + '</div>'
        + '<div class="tc-route" style="padding:6px 0 0">'
        + '<div><i class="fas fa-circle" style="font-size:7px;color:var(--gold);margin-right:5px"></i>'+esc(c.pickup_location)+'</div>'
        + '<div class="arrow"><i class="fas fa-arrow-down"></i></div>'
        + '<div><i class="fas fa-location-dot" style="font-size:7px;color:var(--red);margin-right:5px"></i>'+esc(c.dropoff_location||'TBD')+'</div>'
        + '</div>'
        + '</div>';
    });
  }
  $('cl').innerHTML = h;
}

// ── Trip detail modal ──
function op(id){
  S = TS.find(function(t){return t.id==id;}); if(!S) return;
  var actions = '';
  if(S.status==='assigned' || S.status==='pending'){
    actions += '<button class="btn btn-success" data-act="start"><i class="fas fa-play"></i> Start trip</button>';
  } else if(S.status==='in_progress'){
    actions += '<button class="btn btn-success" data-act="complete"><i class="fas fa-check"></i> Complete</button>';
  }
  if(S.passenger_phone){
    actions += '<a class="btn btn-sm btn-ghost" href="tel:'+esc(S.passenger_phone)+'"><i class="fas fa-phone"></i> Call</a>';
    actions += '<a class="btn btn-sm btn-ghost" href="sms:'+esc(S.passenger_phone)+'"><i class="fas fa-comment"></i> SMS</a>';
  }

  var routeIcon = '<div class="kv"><div class="k">Pickup</div><div class="v"><i class="fas fa-circle" style="font-size:8px;color:var(--gold);margin-right:4px"></i>'+esc(S.pickup_location)+'</div></div>'
    + '<div class="kv"><div class="k">Dropoff</div><div class="v"><i class="fas fa-location-dot" style="font-size:8px;color:var(--red);margin-right:4px"></i>'+esc(S.dropoff_location||'TBD')+'</div></div>';

  var details = '<div class="kv"><div class="k">Trip #'+esc(S.reservation_number)+'</div><div class="v" style="font-weight:700;color:var(--gold)">'+fare(S.price)+'</div></div>'
    + routeIcon
    + '<div class="kv"><div class="k">Passenger</div><div class="v">'+esc(S.passenger_name||'-')+'</div></div>'
    + (S.passenger_phone?'<div class="kv"><div class="k">Phone</div><div class="v">'+esc(S.passenger_phone)+'</div></div>':'')
    + (S.pickup_time?'<div class="kv"><div class="k">Pickup time</div><div class="v">'+esc(fmtTime(S.pickup_time))+'</div></div>':'')
    + '<div class="kv"><div class="k">Status</div><div class="v">'+statusBadgeDr(S.status)+'</div></div>'
    + (S.notes?'<div class="kv"><div class="k">Notes</div><div class="v">'+esc(S.notes)+'</div></div>':'');

  $('mt').innerHTML = '<span>Ava</span> — Trip #'+S.reservation_number;
  $('mb').innerHTML = details;
  $('ma').innerHTML = '<button class="btn btn-sm btn-ghost" data-act="back" style="flex:0"><i class="fas fa-arrow-left"></i> Back</button> ' + actions;
  mcOpen();
  document.querySelectorAll('#ma [data-act]').forEach(function(b){
    b.addEventListener('click', function(){
      var act = b.getAttribute('data-act');
      if(act==='back'){ mc(); return; }
      us(act==='start'?'in_progress':'completed');
    });
  });
}

function _mcEsc(ev){ if(ev.key==='Escape') mc(); }
function mc(){
  $('modal').style.display='none';
  document.body.style.overflow='';
  document.removeEventListener('keydown', _mcEsc);
}
function mcOpen(){
  $('modal').style.display='flex';
  document.body.style.overflow='hidden';
  document.addEventListener('keydown', _mcEsc);
}
function us(status){
  if(!S) return;
  api('PATCH','/api/reservations/'+S.id+'?token='+encodeURIComponent(TOKEN),{status:status})
    .then(function(){toast('Updated');mc(); ld();})
    .catch(function(e){toast(e.message,'err');});
}

// ── Earnings ──
function renderEarnings(){
  var total=0, today=0;
  var td = new Date().toISOString().slice(0,10);
  CS.forEach(function(c){
    var f = parseFloat(c.price||0);
    total += f;
    if(c.created_at && c.created_at.slice(0,10)===td) today += f;
  });
  var avg = CS.length? total/CS.length : 0;
  var h = '<div class="earn-hero"><div class="total">'+fare(total)+'</div><div class="label">Total earnings</div></div>'
    + '<div class="earn-grid">'
    +   '<div><b>'+CS.length+'</b><span>Trips</span></div>'
    +   '<div><b>'+fare(avg).replace('.00','')+'</b><span>Avg/trip</span></div>'
    +   '<div><b>'+fare(today).replace('.00','')+'</b><span>Today</span></div>'
    + '</div>';
  if(CS.length>0){
    h += '<div class="section-title" style="margin-top:8px"><i class="fas fa-clock-rotate-left"></i> History</div>';
    CS.slice(0,30).forEach(function(c){
      h += '<div class="trip-card compact">'
        + '<div class="tc-route" style="padding:4px 0">'
        + '<div style="font-size:13px"><i class="fas fa-circle" style="font-size:7px;color:var(--gold);margin-right:5px"></i>'+esc(c.pickup_location)+'</div>'
        + '<div style="font-size:13px;padding:2px 0 2px 15px"><i class="fas fa-location-dot" style="font-size:7px;color:var(--red);margin-right:5px"></i>'+esc(c.dropoff_location||'TBD')+'</div>'
        + '</div>'
        + '<div style="display:flex;justify-content:space-between;align-items:center;padding-top:4px">'
        + '<span class="muted" style="font-size:11px">'+esc((c.created_at||'').slice(0,10))+'</span>'
        + '<span style="font-weight:600;color:var(--gold);font-size:14px">'+fare(c.price).replace('.00','')+'</span>'
        + '</div></div>';
    });
  } else {
    h += '<div class="empty"><i class="fas fa-sack-dollar"></i><b>No earnings yet</b><div style="font-size:13px;color:var(--muted)">Complete trips to see earnings</div></div>';
  }
  $('ec').innerHTML = h;
}

// ── Settings ──
function renderSettings(){
  var h = '<div class="set-group"><div class="set-label">Driver</div><div class="set-card">'
    + '<div class="set-row"><div class="sl"><div class="sic" style="background:var(--gold-soft)"><i class="fas fa-user" style="color:var(--gold)"></i></div><div><div class="lb">'+esc(D?D.name:'Driver')+'</div><div class="sb">'+esc(D&&D.phone||'')+(D&&D.vehicle_type?' · '+esc(D.vehicle_type):'')+'</div></div></div></div>'
    + '</div></div>'
    + '<div class="set-group"><div class="set-label">Account</div><div class="set-card">'
    + '<div class="set-row" id="lo-btn"><div class="sl"><div class="sic" style="background:rgba(239,68,68,.12)"><i class="fas fa-right-from-bracket" style="color:var(--red)"></i></div><div><div class="lb">Sign out</div><div class="sb">Return to login</div></div></div><i class="fas fa-chevron-right" style="color:var(--muted);font-size:14px"></i></div>'
    + '</div></div>';
  $('sc').innerHTML = h;
  $('lo-btn').addEventListener('click', lo);
}

function lo(){
  if(!confirm('Sign out?')) return;
  D=null; TS=[]; CS=[]; S=null; TOKEN=null;
  $('shell').style.display='none';
  $('login').style.display='flex';
  $('liEmail').value='';
  $('liPw').value='';
  if(window._poll){clearInterval(window._poll); window._poll=null;}
}

})();
</script>
</body>
</html>
