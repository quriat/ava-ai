server {
    listen 80;
    server_name avalimo.net www.avalimo.net;
    return 301 https://avalimo.net$request_uri;
}

server {
    listen 443 ssl http2;
    server_name www.avalimo.net;
    return 301 https://avalimo.net$request_uri;
}

server {
    listen 443 ssl http2;
    server_name avalimo.net;
    root /usr/share/nginx/html;
    index index.html;
    
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    
    location = /index.html { return 301 /; }
    location = /index.htm  { return 301 /; }
    location = /home         { return 301 /; }
    location = /index        { return 301 /; }
    
    location / {
        try_files $uri $uri/ /index.html;
    }
    
    location ~* \.(?:css|js|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 6M;
        add_header Cache-Control "public, immutable";
    }
}
