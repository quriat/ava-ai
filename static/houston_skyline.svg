<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" preserveAspectRatio="xMidYMax slice" width="1600" height="900" role="img" aria-label="Houston skyline at night">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a0d18"/>
      <stop offset="45%" stop-color="#0b1019"/>
      <stop offset="100%" stop-color="#050608"/>
    </linearGradient>
    <linearGradient id="bldgBase" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#10141f"/>
      <stop offset="100%" stop-color="#07090f"/>
    </linearGradient>
    <linearGradient id="bldgLit" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#161b29"/>
      <stop offset="100%" stop-color="#0a0d15"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="100%" r="75%">
      <stop offset="0%" stop-color="#C8A861" stop-opacity="0.10"/>
      <stop offset="60%" stop-color="#C8A861" stop-opacity="0.02"/>
      <stop offset="100%" stop-color="#C8A861" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="goldWash" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#C8A861" stop-opacity="0.0"/>
      <stop offset="100%" stop-color="#C8A861" stop-opacity="0.18"/>
    </linearGradient>
  </defs>

  <!-- Sky -->
  <rect width="1600" height="900" fill="url(#sky)"/>

  <!-- Stars -->
  <g fill="#ffffff">
    <circle cx="120" cy="80" r="1.1" opacity="0.7"/>
    <circle cx="260" cy="140" r="0.8" opacity="0.5"/>
    <circle cx="380" cy="60" r="1.2" opacity="0.8"/>
    <circle cx="520" cy="120" r="0.7" opacity="0.4"/>
    <circle cx="640" cy="50" r="1" opacity="0.6"/>
    <circle cx="780" cy="150" r="0.9" opacity="0.55"/>
    <circle cx="900" cy="90" r="1.1" opacity="0.7"/>
    <circle cx="1040" cy="40" r="0.8" opacity="0.5"/>
    <circle cx="1180" cy="130" r="1.2" opacity="0.8"/>
    <circle cx="1300" cy="70" r="0.9" opacity="0.55"/>
    <circle cx="1440" cy="160" r="1" opacity="0.65"/>
    <circle cx="1540" cy="100" r="0.8" opacity="0.5"/>
    <circle cx="200" cy="220" r="0.7" opacity="0.4"/>
    <circle cx="460" cy="200" r="0.9" opacity="0.5"/>
    <circle cx="720" cy="240" r="0.7" opacity="0.4"/>
    <circle cx="980" cy="210" r="1" opacity="0.6"/>
    <circle cx="1260" cy="230" r="0.8" opacity="0.45"/>
    <circle cx="1480" cy="260" r="0.7" opacity="0.4"/>
  </g>

  <!-- Soft ground glow -->
  <rect x="0" y="500" width="1600" height="400" fill="url(#glow)"/>
  <rect x="0" y="640" width="1600" height="260" fill="url(#goldWash)"/>

  <!-- Skyline (downtown Houston inspired silhouette) -->
  <g>
    <!-- Back row (dimmer) -->
    <g fill="url(#bldgBase)" opacity="0.7">
      <rect x="60" y="520" width="80" height="380"/>
      <rect x="170" y="560" width="60" height="340"/>
      <rect x="250" y="500" width="90" height="400"/>
      <rect x="360" y="580" width="70" height="320"/>
      <rect x="450" y="540" width="100" height="360"/>
      <rect x="570" y="590" width="60" height="310"/>
      <rect x="650" y="520" width="110" height="380"/>
      <rect x="780" y="570" width="70" height="330"/>
      <rect x="870" y="540" width="120" height="360"/>
      <rect x="1010" y="590" width="60" height="310"/>
      <rect x="1090" y="520" width="100" height="380"/>
      <rect x="1210" y="570" width="70" height="330"/>
      <rect x="1300" y="540" width="110" height="360"/>
      <rect x="1430" y="580" width="60" height="320"/>
      <rect x="1510" y="540" width="80" height="360"/>
    </g>

    <!-- Front row (lit, taller) -->
    <g fill="url(#bldgLit)">
      <rect x="90" y="430" width="100" height="470"/>
      <rect x="210" y="360" width="90" height="540"/>
      <rect x="320" y="470" width="110" height="430"/>
      <rect x="450" y="300" width="120" height="600"/>
      <rect x="590" y="410" width="90" height="490"/>
      <rect x="700" y="240" width="140" height="660"/>
      <rect x="860" y="380" width="100" height="520"/>
      <rect x="980" y="440" width="120" height="460"/>
      <rect x="1120" y="330" width="130" height="570"/>
      <rect x="1270" y="430" width="90" height="470"/>
      <rect x="1380" y="360" width="120" height="540"/>
      <rect x="1520" y="450" width="80" height="450"/>
    </g>

    <!-- Window lights (gold/white) -->
    <g fill="#C8A861">
      <rect x="225" y="390" width="6" height="10" opacity="0.8"/>
      <rect x="245" y="390" width="6" height="10" opacity="0.4"/>
      <rect x="225" y="420" width="6" height="10" opacity="0.6"/>
      <rect x="265" y="420" width="6" height="10" opacity="0.9"/>
      <rect x="245" y="460" width="6" height="10" opacity="0.5"/>
      <rect x="275" y="460" width="6" height="10" opacity="0.7"/>
      <rect x="470" y="330" width="7" height="12" opacity="0.8"/>
      <rect x="495" y="330" width="7" height="12" opacity="0.5"/>
      <rect x="520" y="330" width="7" height="12" opacity="0.9"/>
      <rect x="470" y="370" width="7" height="12" opacity="0.6"/>
      <rect x="520" y="370" width="7" height="12" opacity="0.4"/>
      <rect x="495" y="410" width="7" height="12" opacity="0.8"/>
      <rect x="720" y="270" width="8" height="13" opacity="0.9"/>
      <rect x="745" y="270" width="8" height="13" opacity="0.5"/>
      <rect x="770" y="270" width="8" height="13" opacity="0.7"/>
      <rect x="720" y="320" width="8" height="13" opacity="0.6"/>
      <rect x="795" y="320" width="8" height="13" opacity="0.8"/>
      <rect x="745" y="370" width="8" height="13" opacity="0.5"/>
      <rect x="770" y="420" width="8" height="13" opacity="0.7"/>
      <rect x="1000" y="470" width="6" height="11" opacity="0.6"/>
      <rect x="1025" y="470" width="6" height="11" opacity="0.9"/>
      <rect x="1000" y="510" width="6" height="11" opacity="0.4"/>
      <rect x="1050" y="510" width="6" height="11" opacity="0.7"/>
      <rect x="1140" y="360" width="7" height="12" opacity="0.8"/>
      <rect x="1165" y="360" width="7" height="12" opacity="0.5"/>
      <rect x="1190" y="360" width="7" height="12" opacity="0.9"/>
      <rect x="1140" y="410" width="7" height="12" opacity="0.6"/>
      <rect x="1190" y="410" width="7" height="12" opacity="0.4"/>
      <rect x="1165" y="460" width="7" height="12" opacity="0.7"/>
      <rect x="1400" y="390" width="7" height="12" opacity="0.8"/>
      <rect x="1425" y="390" width="7" height="12" opacity="0.5"/>
      <rect x="1450" y="390" width="7" height="12" opacity="0.7"/>
      <rect x="1400" y="440" width="7" height="12" opacity="0.6"/>
      <rect x="1450" y="440" width="7" height="12" opacity="0.9"/>
    </g>
    <g fill="#ffffff">
      <rect x="245" y="420" width="4" height="8" opacity="0.5"/>
      <rect x="520" y="370" width="4" height="8" opacity="0.5"/>
      <rect x="770" y="320" width="4" height="8" opacity="0.5"/>
      <rect x="1190" y="410" width="4" height="8" opacity="0.5"/>
      <rect x="1425" y="440" width="4" height="8" opacity="0.5"/>
    </g>
  </g>

  <!-- Foreground ground line -->
  <rect x="0" y="896" width="1600" height="4" fill="#C8A861" opacity="0.15"/>
</svg>
