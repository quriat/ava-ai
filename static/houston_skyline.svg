<svg xmlns="http://www.w3.org/2000/svg" view="0 0 1600 900" preserveAspectRatio="xMidYMax slice" width="1600" height="900" role="img" aria-label="Houston skyline at night">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a2236"/>
      <stop offset="45%" stop-color="#141b2c"/>
      <stop offset="100%" stop-color="#0a0e18"/>
    </linearGradient>
    <linearGradient id="bldgBase" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2a3142"/>
      <stop offset="100%" stop-color="#161b28"/>
    </linearGradient>
    <linearGradient id="bldgLit" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3a4458"/>
      <stop offset="100%" stop-color="#222a3a"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="100%" r="80%">
      <stop offset="0%" stop-color="#C8A861" stop-opacity="0.22"/>
      <stop offset="55%" stop-color="#C8A861" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#C8A861" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="goldWash" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#C8A861" stop-opacity="0.0"/>
      <stop offset="100%" stop-color="#C8A861" stop-opacity="0.28"/>
    </linearGradient>
  </defs>

  <!-- Sky -->
  <rect width="1600" height="900" fill="url(#sky)"/>

  <!-- Stars -->
  <g fill="#ffffff">
    <circle cx="120" cy="80" r="1.4" opacity="0.85"/>
    <circle cx="260" cy="140" r="1" opacity="0.6"/>
    <circle cx="380" cy="60" r="1.6" opacity="0.95"/>
    <circle cx="520" cy="120" r="0.9" opacity="0.5"/>
    <circle cx="640" cy="50" r="1.3" opacity="0.75"/>
    <circle cx="780" cy="150" r="1.1" opacity="0.65"/>
    <circle cx="900" cy="90" r="1.4" opacity="0.85"/>
    <circle cx="1040" cy="40" r="1" opacity="0.6"/>
    <circle cx="1180" cy="130" r="1.6" opacity="0.95"/>
    <circle cx="1300" cy="70" r="1.1" opacity="0.65"/>
    <circle cx="1440" cy="160" r="1.3" opacity="0.75"/>
    <circle cx="1540" cy="100" r="1" opacity="0.6"/>
    <circle cx="200" cy="220" r="0.9" opacity="0.5"/>
    <circle cx="460" cy="200" r="1.1" opacity="0.6"/>
    <circle cx="720" cy="240" r="0.9" opacity="0.5"/>
    <circle cx="980" cy="210" r="1.3" opacity="0.7"/>
    <circle cx="1260" cy="230" r="1" opacity="0.55"/>
    <circle cx="1480" cy="260" r="0.9" opacity="0.5"/>
  </g>

  <!-- Soft ground glow -->
  <rect x="0" y="480" width="1600" height="420" fill="url(#glow)"/>
  <rect x="0" y="620" width="1600" height="280" fill="url(#goldWash)"/>

  <!-- Skyline (downtown Houston inspired silhouette) -->
  <g>
    <!-- Back row -->
    <g fill="url(#bldgBase)" opacity="0.85">
      <rect x="60" y="520" width="80" height="380"/>
      <rect x="170" y="560" width="60" height="340"/>
      <rect x="250" y="500" width="90" height="400"/>
      <rect x="360" y="580" width="70" height="320"/>
      <rect x="450" y="540" width="100" height="360"/>
      <rect x="570" y="590" width="60" height="310"/>
      <rect x="650" y="520" width="110" height="380"/>
      <rect x="780" y="570" width="70" height="330"/>
      <rect x="870" y="540" width="120" height="360"/>
      <rect x="1010" y="590" width="60" height="310"/>
      <rect x="1090" y="520" width="100" height="380"/>
      <rect x="1210" y="570" width="70" height="330"/>
      <rect x="1300" y="540" width="110" height="360"/>
      <rect x="1430" y="580" width="60" height="320"/>
      <rect x="1510" y="540" width="80" height="360"/>
    </g>

    <!-- Front row (brighter) -->
    <g fill="url(#bldgLit)">
      <rect x="90" y="430" width="100" height="470"/>
      <rect x="210" y="360" width="90" height="540"/>
      <rect x="320" y="470" width="110" height="430"/>
      <rect x="450" y="300" width="120" height="600"/>
      <rect x="590" y="410" width="90" height="490"/>
      <rect x="700" y="240" width="140" height="660"/>
      <rect x="860" y="380" width="100" height="520"/>
      <rect x="980" y="440" width="120" height="460"/>
      <rect x="1120" y="330" width="130" height="570"/>
      <rect x="1270" y="430" width="90" height="470"/>
      <rect x="1380" y="360" width="120" height="540"/>
      <rect x="1520" y="450" width="80" height="450"/>
    </g>

    <!-- Window lights (gold/white) — many, brighter -->
    <g fill="#C8A861">
      <rect x="110" y="460" width="8" height="13" opacity="0.9"/><rect x="135" y="460" width="8" height="13" opacity="0.55"/><rect x="160" y="460" width="8" height="13" opacity="0.8"/>
      <rect x="110" y="500" width="8" height="13" opacity="0.6"/><rect x="160" y="500" width="8" height="13" opacity="0.95"/><rect x="135" y="540" width="8" height="13" opacity="0.5"/>
      <rect x="225" y="390" width="8" height="14" opacity="0.95"/><rect x="250" y="390" width="8" height="14" opacity="0.55"/><rect x="275" y="390" width="8" height="14" opacity="0.85"/>
      <rect x="225" y="430" width="8" height="14" opacity="0.6"/><rect x="275" y="430" width="8" height="14" opacity="0.95"/><rect x="250" y="470" width="8" height="14" opacity="0.5"/><rect x="225" y="510" width="8" height="14" opacity="0.8"/>
      <rect x="340" y="500" width="8" height="13" opacity="0.85"/><rect x="370" y="500" width="8" height="13" opacity="0.5"/><rect x="400" y="500" width="8" height="13" opacity="0.9"/><rect x="340" y="540" width="8" height="13" opacity="0.6"/>
      <rect x="470" y="330" width="9" height="15" opacity="0.95"/><rect x="500" y="330" width="9" height="15" opacity="0.55"/><rect x="530" y="330" width="9" height="15" opacity="0.85"/>
      <rect x="470" y="375" width="9" height="15" opacity="0.6"/><rect x="530" y="375" width="9" height="15" opacity="0.95"/><rect x="500" y="420" width="9" height="15" opacity="0.5"/><rect x="470" y="465" width="9" height="15" opacity="0.8"/>
      <rect x="610" y="440" width="8" height="13" opacity="0.85"/><rect x="640" y="440" width="8" height="13" opacity="0.55"/><rect x="610" y="480" width="8" height="13" opacity="0.9"/>
      <rect x="720" y="270" width="10" height="16" opacity="0.95"/><rect x="750" y="270" width="10" height="16" opacity="0.55"/><rect x="780" y="270" width="10" height="16" opacity="0.85"/><rect x="720" y="320" width="10" height="16" opacity="0.6"/><rect x="780" y="320" width="10" height="16" opacity="0.95"/>
      <rect x="750" y="370" width="10" height="16" opacity="0.5"/><rect x="720" y="420" width="10" height="16" opacity="0.8"/><rect x="780" y="470" width="10" height="16" opacity="0.65"/>
      <rect x="880" y="410" width="8" height="13" opacity="0.85"/><rect x="910" y="410" width="8" height="13" opacity="0.55"/><rect x="880" y="450" width="8" height="13" opacity="0.9"/>
      <rect x="1000" y="470" width="9" height="14" opacity="0.95"/><rect x="1030" y="470" width="9" height="14" opacity="0.55"/><rect x="1060" y="470" width="9" height="14" opacity="0.85"/><rect x="1000" y="510" width="9" height="14" opacity="0.6"/>
      <rect x="1140" y="360" width="9" height="15" opacity="0.95"/><rect x="1170" y="360" width="9" height="15" opacity="0.55"/><rect x="1200" y="360" width="9" height="15" opacity="0.85"/>
      <rect x="1140" y="410" width="9" height="15" opacity="0.6"/><rect x="1200" y="410" width="9" height="15" opacity="0.95"/><rect x="1170" y="460" width="9" height="15" opacity="0.5"/><rect x="1140" y="510" width="9" height="15" opacity="0.8"/>
      <rect x="1290" y="460" width="8" height="13" opacity="0.85"/><rect x="1320" y="460" width="8" height="13" opacity="0.55"/><rect x="1290" y="500" width="8" height="13" opacity="0.9"/>
      <rect x="1400" y="390" width="9" height="15" opacity="0.95"/><rect x="1430" y="390" width="9" height="15" opacity="0.55"/><rect x="1460" y="390" width="9" height="15" opacity="0.85"/><rect x="1400" y="440" width="9" height="15" opacity="0.6"/><rect x="1460" y="440" width="9" height="15" opacity="0.95"/>
      <rect x="1430" y="490" width="9" height="15" opacity="0.5"/><rect x="1400" y="540" width="9" height="15" opacity="0.8"/>
      <rect x="1540" y="480" width="8" height="13" opacity="0.85"/><rect x="1565" y="480" width="8" height="13" opacity="0.55"/>
    </g>
    <g fill="#ffffff">
      <rect x="250" y="430" width="5" height="9" opacity="0.6"/><rect x="530" y="375" width="5" height="9" opacity="0.6"/>
      <rect x="780" y="320" width="5" height="9" opacity="0.6"/><rect x="1200" y="410" width="5" height="9" opacity="0.6"/><rect x="1460" y="440" width="5" height="9" opacity="0.6"/>
    </g>

    <!-- Building top accent lights -->
    <g fill="#C8A861" opacity="0.8">
      <rect x="700" y="234" width="140" height="3"/>
      <rect x="450" y="294" width="120" height="3"/>
      <rect x="1120" y="324" width="130" height="3"/>
    </g>
  </g>

  <!-- Foreground ground line -->
  <rect x="0" y="896" width="1600" height="4" fill="#C8A861" opacity="0.25"/>
</svg>
